<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGG - Iniciar Sesión</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="js/login.css">
    <link rel="stylesheet" href="SGG/js/login.css">
</head>
<body>

    <div class="theme-container">
        <button id="theme-toggle" aria-label="Cambiar tema visual de la página">🌙 Modo Noche</button>
    </div>

    <main class="container" id="mainContainer">
        
        <section class="form-container" id="loginBlock">
            <h2>Iniciar Sesión</h2>
            
            <div class="social-container">
                <a href="#" class="social" aria-label="Iniciar sesión con Twitch"><i class="fab fa-twitch" aria-hidden="true"></i></a>
                <a href="#" class="social" aria-label="Iniciar sesión con Twitter"><i class="fab fa-twitter" aria-hidden="true"></i></a>
                <a href="#" class="social" aria-label="Iniciar sesión con Instagram"><i class="fab fa-instagram" aria-hidden="true"></i></a>
                <a href="#" class="social" aria-label="Iniciar sesión con Tiktok"><i class="fab fa-tiktok" aria-hidden="true"></i></a>
            </div>
            
            <p class="form-instruction">Use su correo y contraseña</p>
            
            <form id="loginForm">
                <div class="input-field">
                    <i class="fas fa-envelope" aria-hidden="true"></i>
                    <input type="text" id="usuario" placeholder="Email" value="admin" required aria-label="Correo electrónico">
                </div>
                <div class="input-field">
                    <i class="fas fa-lock" aria-hidden="true"></i>
                    <input type="password" id="contrasena" placeholder="Contraseña" value="admin" required aria-label="Contraseña">
                </div>
                
                <a href="#" class="forgot-pass">¿Olvidaste tu contraseña?</a>
                
                <button type="submit" class="btn-main">INICIAR SESIÓN</button>
            </form>
        </section>

        <section class="form-container success-block" id="welcomeBlock" style="display: none;">
            <div class="success-icon" role="img" aria-label="Icono de celebración">🎉</div>
            <h2>¡Sesión Iniciada!</h2>
            <p class="success-text">Has ingresado correctamente a tu cuenta de SGG.</p>
        </section>

        <section class="overlay-container">
            <div class="overlay">
                <h1>¡Bienvenido!</h1>
                <p class="overlay-text">Ingrese sus datos personales para usar todas las funciones del sitio</p>
                <button class="btn-ghost">Registrarse</button>
            </div>
        </section>

    </main>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const usuario = document.getElementById('usuario').value;
            const contrasena = document.getElementById('contrasena').value;

            if (usuario === 'admin' && contrasena === 'admin') {
                document.getElementById('loginBlock').style.display = 'none';
                document.getElementById('welcomeBlock').style.display = 'flex';
            } else {
                alert('Credenciales incorrectas. Intenta con admin / admin');
            }
        });

        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            if (document.body.classList.contains('dark-mode')) {
                themeToggle.innerHTML = "☀️ Modo Día";
            } else {
                themeToggle.innerHTML = "🌙 Modo Noche";
            }
        });
    </script>
</body>
</html>
